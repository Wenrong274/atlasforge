name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore AtlasForge.sln
      - run: dotnet format AtlasForge.sln --verify-no-changes
      - run: dotnet build AtlasForge.sln --no-restore -c Release
      - run: dotnet test AtlasForge.sln --no-build -c Release
