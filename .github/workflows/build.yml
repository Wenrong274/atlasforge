name: build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore AtlasForge.sln
      - run: dotnet format AtlasForge.sln --verify-no-changes
      - run: dotnet build AtlasForge.sln --no-restore -c Release /warnaserror
      - run: dotnet test AtlasForge.sln --no-build -c Release
